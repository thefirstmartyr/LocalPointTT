name: local_point_tt
description: Digital loyalty platform for local businesses in Trinidad and Tobago
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI Components
  cupertino_icons: ^1.0.6
  google_fonts: ^8.0.2
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  fl_chart: ^1.1.1
  animations: ^2.0.11

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0

  # Firebase
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2
  firebase_messaging: ^16.1.1
  firebase_storage: ^13.0.6
  google_sign_in: ^6.1.5

  # State Management
  provider: ^6.1.1

  # Networking
  http: ^1.1.2
  dio: ^5.4.0

  # Local Storage
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  path_provider: ^2.1.1

  # Utilities
  intl: ^0.20.2
  uuid: ^4.2.2
  connectivity_plus: ^7.0.0
  permission_handler: ^12.0.1
  image_picker: ^1.0.5
  url_launcher: ^6.2.2
  share_plus: ^10.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.7
  mockito: ^5.4.4
  fake_cloud_firestore: ^4.0.1

flutter:
  uses-material-design: true
